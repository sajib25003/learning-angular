<h2 class="text-center font-bold text-2xl py-10">To Do App</h2>
<div class="flex justify-center items-center">
  <input
    class="bg-white px-2 py-1 rounded-l-lg min-w-64"
    placeholder="Type a task"
    [value]="newToDo()"
    (input)="newToDo.set($event.target.value)"
  />
  <button (click)="addToDo()" class="rounded-r-lg px-5 py-1 bg-emerald-500">Add</button>
</div>

<hr class="my-6" />

<ul class="mx-20">
  @for (item of toDo(); track $index) {
    <li class="flex justify-between items-center px-4 py-2 my-2 bg-gray-300">
      <span>{{ $index + 1 }}.</span>
      <span (click)="toggleToDo($index)" [class]="item.done ? 'line-through' : ''">{{
        item.text
      }}</span>
      <button (click)="deleteToDo($index)">
        <lucide-icon [img]="Trash" class="w-5 h-5 text-red-500"></lucide-icon>
      </button>
    </li>
  }
</ul>
