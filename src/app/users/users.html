<div class="mx-20 space-y-2 mt-6">
  <form class="space-y-4 max-w-md">
    <!-- Name -->
    <div>
      <label class="block mb-1 font-medium">Name</label>
      <input
        type="text"
        [value]="name()"
        (input)="name.set($event.target.value)"
        class="w-full border px-3 py-2 rounded"
        placeholder="Enter name"
        required
      />
    </div>

    <!-- Email -->
    <div>
      <label class="block mb-1 font-medium">Email</label>
      <input
        type="email"
        [value]="email()"
        (input)="email.set($event.target.value)"
        class="w-full border px-3 py-2 rounded"
        placeholder="Enter email"
        required
      />
    </div>

    <!-- Submit Button -->
    <button (click)="submitForm()" class="bg-blue-500 text-white px-4 py-2 rounded">
      {{ selectedUserId() ? 'Update User' : 'Add User' }}
    </button>
  </form>
  <hr />
  <h2>User List</h2>
  <ul class="space-y-1">
    @for (user of users(); track $index) {
      <li>
        <span>{{ user.name }} - {{ user.email }}</span>

        <!-- ✅ Edit Button -->
        <button (click)="updateForm(user)" class="bg-yellow-400 px-2 ml-6 py-1 rounded text-sm">
          Edit
        </button>
        <button (click)="deleteUser(user.id)" class="bg-red-400 px-2 ml-6 py-1 rounded text-sm">
          Delete
        </button>
      </li>
    }
  </ul>
</div>
