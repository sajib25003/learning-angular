<div class="mx-20 space-y-2 mt-6">
  <form class="space-y-4 max-w-md">
    <!-- Name -->
    <div>
      <label class="block mb-1 font-medium">Name</label>
      <input
        type="text"
        [value]="name()"
        (input)="name.set($event.target.value)"
        class="w-full border px-3 py-2 rounded"
        placeholder="Enter name"
        required
      />
    </div>

    <!-- Email -->
    <div>
      <label class="block mb-1 font-medium">Email</label>
      <input
        type="email"
        [value]="email()"
        (input)="email.set($event.target.value)"
        class="w-full border px-3 py-2 rounded"
        placeholder="Enter email"
        required
      />
    </div>

    <!-- Submit Button -->
    <button (click)="submitForm()" class="bg-blue-500 text-white px-4 py-2 rounded">
      Add User
    </button>
  </form>
  <hr />
  <h2>User List</h2>
  <ul class="space-y-1">
    @for (user of users(); track $index) {
      <li>{{ $index + 1 }} - {{ user.name }} - {{ user.email }}</li>
    }
  </ul>
</div>
