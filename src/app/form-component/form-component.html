<div class="my-10">
  <h2 class="text-2xl my-6 font-bold text-center">NgRx with Forms</h2>
  <div class="mx-10 text-center">
    @if (form$ | async; as form) {
      <input
        type="text"
        placeholder="Enter Name"
        [value]="form.name"
        (input)="updateField('name', $event.target.value)"
        class="bg-blue-200 px-2 py-2 rounded-lg mr-6"
      />
      <input
        type="text"
        placeholder="Enter Email"
        [value]="form.email"
        (input)="updateField('email', $event.target.value)"
        class="bg-blue-200 px-2 py-2 rounded-lg mr-6"
      />

      <button class="bg-emerald-300 rounded-lg px-3 py-1.5" (click)="resetForm()">
        Reset Form
      </button>

      <hr class="my-6" />

      <div class="text-left">
        <h3 class="text-xl font-semibold">Form Preview</h3>
        <pre>{{ form | json }}</pre>
      </div>
    }
  </div>
</div>
